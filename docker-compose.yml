version: '3.8'

# night.fun — Proof Server
# Required for local ZK proof generation.
# Mirrors the pattern from create-mn-app.
#
# Usage:
#   docker-compose up -d
#   # or:
#   npm run start-proof-server

services:
  proof-server:
    image: midnightntwrk/proof-server:7.0.0
    command: ["--", "midnight-proof-server", "-v"]
    ports:
      - "6300:6300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6300/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# After starting, configure Lace wallet:
#   Settings → Midnight → Prover Server → Local (http://localhost:6300)
