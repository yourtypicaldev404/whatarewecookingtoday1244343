# Proof server (ZK) — required for local proving. Default Preview-compatible image.
#
# Proof only (typical local dev — then run deploy-server on the host):
#   docker compose up -d
#   PROOF_SERVER_URL=http://127.0.0.1:6300 node deploy-server.mjs
#
# Proof + deploy server in Docker (same network; deploy talks to proof at http://proof-server:6300):
#   docker compose --profile full up -d --build
#   curl http://localhost:3003/health
#
# Lace wallet (browser): Settings → Midnight → Prover Server → http://localhost:6300 when using local proof.

services:
  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    command: ["--", "midnight-proof-server", "-v"]
    ports:
      - "6300:6300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6300/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  deploy-server:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.deploy
    ports:
      - "3003:3003"
    environment:
      PROOF_SERVER_URL: http://proof-server:6300
      NETWORK_ID: ${NETWORK_ID:-mainnet}
      PORT: "3003"
    # Optional: copy .env to project root or use `docker compose --env-file .env --profile full up`
    depends_on:
      proof-server:
        condition: service_healthy
    restart: unless-stopped
